<div id="postModal" class="modal">
    <div class="modal-content">
        <h3>📢 ลงประกาศขายสินค้า</h3>
        
        <div class="upload-zone" onclick="document.getElementById('pImage').click()">
            <input type="file" id="pImage" accept="image/*" onchange="previewImg(event)" hidden>
            <div id="uploadPlaceholder">
                <span style="font-size: 40px;">📸</span>
                <p>คลิกเพื่อเพิ่มรูปภาพสินค้า</p>
            </div>
            <img id="imgPre" src="" style="display:none; width:100%; border-radius:15px;">
        </div>

        <input type="text" id="pTitle" placeholder="ชื่อสินค้า (เช่น หนังสือเรียน, อุปกรณ์กีฬา)">
        <select id="pCat">
            <option value="ทั่วไป">เลือกคณะ/หมวดหมู่</option>
            <option value="วิทยาศาสตร์">คณะวิทยาศาสตร์</option>
            <option value="วิทยาการจัดการ">คณะวิทยาการจัดการ</option>
            <option value="มนุษยศาสตร์">คณะมนุษยศาสตร์ฯ</option>
            <option value="ศึกษาศาสตร์">คณะศึกษาศาสตร์</option>
        </select>
        <input type="number" id="pPrice" placeholder="ราคา (บาท)">
        <textarea id="pDesc" rows="4" placeholder="รายละเอียดสินค้า เช่น สภาพสินค้า, สถานที่นัดรับ..."></textarea>
        
        <div class="modal-footer">
            <button onclick="closeModal('postModal')" class="btn-secondary">ยกเลิก</button>
            <button onclick="savePost()" id="btnSave" class="btn-primary">ยืนยันการโพสต์</button>
        </div>
    </div>
</div>
