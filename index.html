<div id="postModal" class="modal">
    <div class="modal-content">
        <h3>📢 ลงประกาศขายสินค้า</h3>
        <div class="upload-section">
            <input type="file" id="pImage" accept="image/*" onchange="previewImg(event)">
            <img id="imgPre" src="" style="display:none; width:100%; border-radius:10px; margin-top:10px;">
        </div>
        
        <input type="text" id="pTitle" placeholder="ชื่อสินค้า">
        <select id="pCat">
            <option value="ทั่วไป">เลือกคณะ/หมวดหมู่</option>
            <option value="วิทยาศาสตร์">วิทยาศาสตร์</option>
            <option value="วิทยาการจัดการ">วิทยาการจัดการ</option>
            <option value="มนุษยศาสตร์">มนุษยศาสตร์</option>
            <option value="ศึกษาศาสตร์">ศึกษาศาสตร์</option>
        </select>
        <input type="number" id="pPrice" placeholder="ราคา (บาท)">
        <textarea id="pDesc" placeholder="รายละเอียดสินค้าและจุดนัดรับ..."></textarea>
        
        <div class="modal-footer">
            <button onclick="closeModal('postModal')" class="btn-secondary">ยกเลิก</button>
            <button onclick="savePost()" id="btnSave" class="btn-primary">ยืนยันโพสต์</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>
