<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRU Digital Market | ตลาดซื้อขายออนไลน์</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="authSection" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-circle">🌙</div>
                <h2>CRU <span>Market</span></h2>
                <p id="authTitle">ยินดีต้อนรับนักศึกษา</p>
            </div>
            <div class="auth-body">
                <input type="email" id="email" placeholder="อีเมลมหาวิทยาลัย (@chandra.ac.th)">
                <input type="password" id="password" placeholder="รหัสผ่าน">
                <button onclick="handleAuth()" id="btnAuth" class="btn-primary">เข้าสู่ระบบ</button>
                <p class="auth-footer">
                    <span id="toggleText">ยังไม่มีบัญชี?</span> 
                    <a href="javascript:void(0)" onclick="toggleAuthMode()" id="btnToggle">สมัครสมาชิก</a>
                </p>
            </div>
        </div>
    </div>

    <div id="appSection" class="app-container" style="display: none;">
        <nav class="navbar">
            <div class="nav-content">
                <div class="brand">🌙 CRU <span>Market</span></div>
                <div class="nav-actions">
                    <button class="btn-add" onclick="openModal('postModal')">+ ลงประกาศใหม่</button>
                    <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
                </div>
            </div>
        </nav>

        <div class="layout">
            <aside class="sidebar">
                <h3>คณะ / หมวดหมู่</h3>
                <ul id="catFilter">
                    <li class="active" onclick="filterBy('all')">ทั้งหมด</li>
                    <li onclick="filterBy('วิทยาศาสตร์')">วิทยาศาสตร์</li>
                    <li onclick="filterBy('วิทยาการจัดการ')">วิทยาการจัดการ</li>
                    <li onclick="filterBy('มนุษยศาสตร์')">มนุษยศาสตร์</li>
                    <li onclick="filterBy('ศึกษาศาสตร์')">ศึกษาศาสตร์</li>
                </ul>
            </aside>

            <main class="main-feed">
                <div id="productGrid" class="grid">
                    </div>
            </main>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3>📢 ลงประกาศใหม่</h3>
            <div class="form-group">
                <input type="text" id="pTitle" placeholder="ชื่อสินค้า/บริการ">
                <select id="pCat">
                    <option value="ทั่วไป">เลือกคณะ</option>
                    <option value="วิทยาศาสตร์">วิทยาศาสตร์</option>
                    <option value="วิทยาการจัดการ">วิทยาการจัดการ</option>
                    <option value="มนุษยศาสตร์">มนุษยศาสตร์</option>
                    <option value="ศึกษาศาสตร์">ศึกษาศาสตร์</option>
                </select>
            </div>
            <div class="calc-box">
                <label>💰 ระบบคำนวณราคาหาร</label>
                <div class="calc-row">
                    <input type="number" id="pPrice" placeholder="ราคารวม" oninput="calcPrice()">
                    <input type="number" id="pSplit" placeholder="จำนวนคนหาร" value="1" oninput="calcPrice()">
                </div>
                <div id="pricePerPerson" class="price-result">ราคาต่อคน: ฿0.00</div>
            </div>
            <textarea id="pDesc" placeholder="รายละเอียดสินค้าและจุดนัดรับ..."></textarea>
            <div class="modal-btns">
                <button onclick="closeModal('postModal')" class="btn-text">ยกเลิก</button>
                <button onclick="savePost()" class="btn-primary">ยืนยันการโพสต์</button>
            </div>
        </div>
    </div>

    <div id="chatBox" class="chat-float" style="display: none;">
        <div class="chat-header">
            <span id="chatWith">แชทสอบถาม</span>
            <button onclick="closeChat()">×</button>
        </div>
        <div id="chatMsgs" class="chat-body"></div>
        <div class="chat-footer">
            <input type="text" id="msgInp" placeholder="พิมพ์ข้อความ...">
            <button onclick="sendMsg()">ส่ง</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
